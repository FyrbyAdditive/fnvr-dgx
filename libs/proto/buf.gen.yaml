version: v2
managed:
  enabled: true
plugins:
  # Go code for the api-server.
  - remote: buf.build/protocolbuffers/go:v1.35.1
    out: ../go-common/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: ../go-common/gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  # C++ code for pipeline-supervisor.
  - remote: buf.build/protocolbuffers/cpp:v28.2
    out: ../../apps/pipeline-supervisor/src/gen
  - remote: buf.build/grpc/cpp:v1.66.2
    out: ../../apps/pipeline-supervisor/src/gen
