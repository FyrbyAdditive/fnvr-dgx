# fnvr-dgx stack — targets NVIDIA DGX Spark (GB10).
#
# Profiles:
#   gpu      = adds the pipeline-supervisor container (DGX Spark host,
#              requires nvidia-container-toolkit)
#   dev/lite = adds the synthetic testsrc RTSP source
#   (Compose profiles are additive-only; the old `!lite` negation was
#   never valid and silently excluded the pipeline on modern compose.)
#
# Usage:
#   docker compose --profile gpu up -d       # DGX Spark
#   docker compose --profile lite up -d      # Mac / GPU-less workstations

name: fnvr

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: fnvr
      POSTGRES_PASSWORD: fnvr
      POSTGRES_DB: fnvr
    volumes:
      # postgres 18+ images keep PGDATA in a version subdirectory under
      # /var/lib/postgresql — mount the parent, not .../data, so future
      # major upgrades can pg_upgrade --link across one mount.
      - postgres-data:/var/lib/postgresql
    # Tuning targets the DGX Spark (GB10: 128 GB coherent unified
    # LPDDR5x shared between CPU and GPU, NVMe). Deliberately NOT the
    # classic 25%-of-RAM shared_buffers: the GPU, TRT engines and video
    # buffers live in the SAME memory pool, and the plan reserves
    # ≥80 GB for them — postgres gets a generous-but-bounded slice.
    # Workload is detection inserts (~40/s with RF-DETR) + JSONB scans
    # + pgvector similarity + segment housekeeping. If you deploy on a
    # smaller host, halve shared_buffers / effective_cache_size and
    # drop work_mem to 16MB. See docs/operations/postgres-tuning.md.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=16GB"
      - "-c"
      - "effective_cache_size=64GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=2GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_wal_size=16GB"
      - "-c"
      - "min_wal_size=2GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "default_statistics_target=200"
      - "-c"
      - "max_parallel_workers_per_gather=4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fnvr -d fnvr"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring

  # Optional MQTT broker for Home Assistant bridge + mqtt notification
  # channels. Anonymous access allowed so a local dev can `up --profile
  # mqtt` and be running in 5 seconds. In production, use an external
  # broker (or at minimum edit mosquitto.conf below to require auth).
  mosquitto:
    profiles: ["mqtt"]
    image: eclipse-mosquitto:2
    restart: unless-stopped
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]
    ports:
      - "1883:1883" # MQTT
    volumes:
      - mosquitto-data:/mosquitto/data

  api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_HTTP_ADDR: ":8081"
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_DATA_DIR: "/var/lib/fnvr"
      # MediaMTX runtime config API — api-server syncs per-camera
      # re-muxer paths here when mtx_proxy is toggled. Empty/unset
      # disables the integration gracefully.
      FNVR_MTX_API_URL: "http://mediamtx:9997"
    volumes:
      - fnvr-data:/var/lib/fnvr
      # 1-fps JPEG preview ring lives on tmpfs — small, constantly
      # overwritten, regenerated on pipeline restart; no reason to burn
      # SSD cycles on it. Shared named volume so pipeline writer and api
      # reader see the same backing store.
      - fnvr-live:/var/lib/fnvr/live
      # NOTE: the Orin compose bind-mounted /sys/class/video4linux (+
      # /sys/devices) for the /system/local-devices USB-camera listing.
      # On a host with no V4L2 devices that path doesn't exist and
      # docker refuses to start the container. The endpoint degrades to
      # an empty list without the mounts; re-add them if you attach USB
      # cameras directly to the Spark (the usb-bridge profile is the
      # supported route anyway).
    ports:
      # Public: web UI + JSON API (+ unauthenticated /metrics scrape
      # endpoint for Prometheus).
      - "8081:8081"

  events:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.events
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_RECORDINGS_DIR: "/var/lib/fnvr/recordings"
    # Prometheus scrape endpoint at :9091 on the compose network.
    # Internal only — no external publish. When adding a `prometheus`
    # service here, point scrape_configs at events:9091 and api:8081.
    expose:
      - "9091"
    volumes:
      # event-processor writes per-segment detection sidecar JSONL files
      # next to each rec.mp4. Storage-manager deletes them in lockstep
      # when a segment is purged, keeping Postgres small.
      - fnvr-data:/var/lib/fnvr

  notifications:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.notifications
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"

  storage:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.storage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_RECORDINGS_DIR: "/var/lib/fnvr/recordings"
    volumes:
      - fnvr-data:/var/lib/fnvr
      - fnvr-live:/var/lib/fnvr/live

  # CPU-only Python sidecar for face-id side-operations the pipeline
  # doesn't do: photo-upload enrolment (detect+embed a single JPEG),
  # HDBSCAN clustering of unmatched embeddings (nightly + on-demand),
  # weekly drift check, and scaffolding for future TAO fine-tune.
  # Reachable on the docker bridge at http://ml-worker:8090; no
  # published port — api-server is the only client.
  ml-worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.ml
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_MODELS_DIR: "/var/lib/fnvr/models/faceid"
      FNVR_TZ: "Europe/London"
    volumes:
      - fnvr-data:/var/lib/fnvr

  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      FNVR_API_UPSTREAM: "http://api:8081"
    ports:
      - "8080:80"

  # Pipeline — runs on the DGX Spark host. GPU access via a compose
  # device reservation (nvidia-container-toolkit + CDI on DGX OS) —
  # the host registers no `nvidia` docker runtime, so `runtime: nvidia`
  # would fail here.
  pipeline:
    profiles: ["gpu"]
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.pipeline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      # compute = CUDA/TensorRT, video = NVDEC/NVENC, utility = nvidia-smi.
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_RECORDINGS_DIR: "/var/lib/fnvr/recordings"
      FNVR_USE_DEEPSTREAM: "${FNVR_USE_DEEPSTREAM:-1}"
      FNVR_RECONCILE_SEC: "${FNVR_RECONCILE_SEC:-5}"
      # Max cameras per batched-mux worker group; also sizes the shared
      # TRT engine's max batch ($BATCH in the nvinfer template).
      FNVR_GROUP_MAX: "${FNVR_GROUP_MAX:-8}"
      # Some GStreamer elements g_assert on non-fatal conditions. Unset
      # G_DEBUG so fatal-warnings are off — without this, one bad camera
      # can crash-kill all the others sharing the supervisor process.
      G_DEBUG: ""
    volumes:
      - fnvr-data:/var/lib/fnvr
      - fnvr-live:/var/lib/fnvr/live
      - ../config:/etc/fnvr:ro

  # Synthetic RTSP source for dev & CI. Publishes a looped test pattern at
  # rtsp://mediamtx:8554/test — add as a camera URL to exercise ingest/record
  # without real hardware. Optional: copy your own clip to ./testclip.mp4 and
  # it'll be served too.
  # MediaMTX serves RTSP re-streams: synthetic test source (profile dev/lite)
  # and — when v4l2 cams are present — a USB→RTSP bridge so pipeline-supervisor
  # can treat local cameras with the proven RTSP code path.
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      # Static config lives in deploy/config/mediamtx.yml (mounted
      # below) — path-pattern rules (record live_* only, never the
      # lp_* NVENC proxies) can't be expressed as env names. Env still
      # carries the deployment-specific WebRTC ICE hosts; env
      # OVERRIDES yaml, and FNVR_LAN_IP comes from .env — NEVER pass
      # it as a shell variable.
      MTX_WEBRTCADDITIONALHOSTS: "${FNVR_LAN_IP:-172.16.4.23}"
    volumes:
      - ../config/mediamtx.yml:/mediamtx.yml:ro
      # MediaMTX writes recordings here; storage-manager + api-server
      # read from the same path via the same volume.
      - fnvr-data:/var/lib/fnvr
    ports:
      - "8554:8554" # rtsp
      - "8889:8889" # webrtc (whep on /<path>/whep)
      - "8189:8189/udp" # webrtc ICE (single-port UDP mux)
      - "9996:9996" # playback API (timeline /get clips)

  # Shared Triton inference server (detector.inference_backend=triton):
  # serves the RF-DETR engine to every worker over gRPC — one engine
  # copy + one CUDA context instead of per-worker duplicates. Workers
  # fall back is manual: set the setting back to nvinfer + restart.
  triton:
    profiles: ["gpu"]
    image: fnvr-pipeline
    restart: unless-stopped
    entrypoint: ["bash", "/usr/local/bin/triton-entrypoint.sh"]
    environment:
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - fnvr-data:/var/lib/fnvr
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf localhost:8000/v2/models/rfdetr/ready"]
      interval: 10s
      timeout: 3s
      retries: 30

  # On-demand playback transcoder: H.265 recordings → H.264 fMP4 for
  # browsers without H.265 MSE (Firefox; some remote clients). Reuses
  # the pipeline image (GStreamer + NVDEC/NVENC); both units are
  # otherwise idle while someone scrubs the timeline. The web timeline
  # falls back to :9995 when MediaSource can't do hvc1.
  transcoder:
    profiles: ["gpu"]
    image: fnvr-pipeline
    restart: unless-stopped
    depends_on:
      - mediamtx
    entrypoint: ["python3", "/usr/local/bin/fnvr-transcoder.py"]
    environment:
      FNVR_MTX_PLAYBACK: "http://mediamtx:9996"
      FNVR_TRANSCODER_MAX: "3"
      # `video` is NOT in the default capability set — without it the
      # container has no NVDEC/NVENC and nvv4l2decoder fails with
      # "not enough memory or failing driver".
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "9995:9995"

  # USB→RTSP bridge. When /dev/video0 exists on the host, reads MJPEG and
  # publishes H.264 to rtsp://mediamtx:8554/fnvr-usb0. Camera entries in the
  # DB use that URL; pipeline-supervisor then hits it via the working RTSP
  # code path — sidestepping the direct v4l2 SIGSEGV-after-NVENC-init bug.
  usb-bridge:
    # Only started when explicitly requested (`--profile usb`): without
    # the profile gate, a missing /dev/video0 (no USB cam plugged in)
    # makes docker refuse to (re)create the container, which bleeds into
    # manual restart-all operations. Most deployments use IP cameras and
    # don't need this path.
    profiles: ["usb"]
    image: linuxserver/ffmpeg:latest
    restart: unless-stopped
    depends_on:
      - mediamtx
    devices:
      - /dev/video0
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        exec ffmpeg -f v4l2 -input_format mjpeg -video_size 1280x720 \
          -framerate 30 -i /dev/video0 \
          -c:v libx264 -preset veryfast -tune zerolatency \
          -g 60 -b:v 4M -pix_fmt yuv420p \
          -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/usb0

  # Companion that pushes a synthetic looped stream into mediamtx.
  testsrc:
    profiles: ["dev", "lite"]
    image: linuxserver/ffmpeg:latest
    restart: unless-stopped
    depends_on:
      - mediamtx
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        exec ffmpeg -re -stream_loop -1 \
          -f lavfi -i "testsrc2=size=1920x1080:rate=30,drawtext=text='fnvr %{localtime}':fontsize=48:fontcolor=white:x=20:y=20" \
          -f lavfi -i "sine=frequency=440" \
          -c:v libx264 -preset veryfast -tune zerolatency -g 60 -b:v 4M \
          -c:a aac -b:a 64k \
          -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/test

volumes:
  postgres-data:
  fnvr-data:
  mosquitto-data:
  # tmpfs-backed named volume for the live JPEG ring. Shared across
  # pipeline (writer) + api + storage (readers). 128 MB is plenty:
  # multifilesink keeps max-files=4 per camera at ~50 KB each.
  fnvr-live:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=128m,mode=0755"
