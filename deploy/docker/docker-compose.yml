# fnvr — M1 stack.
#
# Profiles:
#   default  = pipeline-supervisor included (Jetson host, requires nvidia-container-toolkit)
#   lite     = skips the pipeline container (Mac / x86 workstations)
#
# Usage:
#   docker compose up -d                     # Jetson
#   docker compose --profile lite up -d      # everywhere else

name: fnvr

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: fnvr
      POSTGRES_PASSWORD: fnvr
      POSTGRES_DB: fnvr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fnvr -d fnvr"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring

  # Optional MQTT broker for Home Assistant bridge + mqtt notification
  # channels. Anonymous access allowed so a local dev can `up --profile
  # mqtt` and be running in 5 seconds. In production, use an external
  # broker (or at minimum edit mosquitto.conf below to require auth).
  mosquitto:
    profiles: ["mqtt"]
    image: eclipse-mosquitto:2
    restart: unless-stopped
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]
    ports:
      - "1883:1883" # MQTT
    volumes:
      - mosquitto-data:/mosquitto/data

  api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_HTTP_ADDR: ":8081"
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_DATA_DIR: "/var/lib/fnvr"
      # MediaMTX runtime config API — api-server syncs per-camera
      # re-muxer paths here when mtx_proxy is toggled. Empty/unset
      # disables the integration gracefully.
      FNVR_MTX_API_URL: "http://mediamtx:9997"
    volumes:
      - fnvr-data:/var/lib/fnvr
      # 1-fps JPEG preview ring lives on tmpfs — small, constantly
      # overwritten, regenerated on pipeline restart; no reason to burn
      # SSD cycles on it. Shared named volume so pipeline writer and api
      # reader see the same backing store.
      - fnvr-live:/var/lib/fnvr/live
      # Surface host V4L2 device metadata for the /system/local-devices endpoint.
      # Read-only. /sys/class/video4linux/videoN is a symlink into
      # /sys/devices/..., so we need both for the {name,device_caps} reads.
      - /sys/class/video4linux:/sys/class/video4linux:ro
      - /sys/devices:/sys/devices:ro
    ports:
      # Public: web UI + JSON API (+ unauthenticated /metrics scrape
      # endpoint for Prometheus).
      - "8081:8081"

  events:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.events
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_RECORDINGS_DIR: "/var/lib/fnvr/recordings"
    # Prometheus scrape endpoint at :9091 on the compose network.
    # Internal only — no external publish. When adding a `prometheus`
    # service here, point scrape_configs at events:9091 and api:8081.
    expose:
      - "9091"
    volumes:
      # event-processor writes per-segment detection sidecar JSONL files
      # next to each rec.mp4. Storage-manager deletes them in lockstep
      # when a segment is purged, keeping Postgres small.
      - fnvr-data:/var/lib/fnvr

  notifications:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.notifications
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"

  storage:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.storage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_RECORDINGS_DIR: "/var/lib/fnvr/recordings"
    volumes:
      - fnvr-data:/var/lib/fnvr
      - fnvr-live:/var/lib/fnvr/live

  # CPU-only Python sidecar for face-id side-operations the pipeline
  # doesn't do: photo-upload enrolment (detect+embed a single JPEG),
  # HDBSCAN clustering of unmatched embeddings (nightly + on-demand),
  # weekly drift check, and scaffolding for future TAO fine-tune.
  # Reachable on the docker bridge at http://ml-worker:8090; no
  # published port — api-server is the only client.
  ml-worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.ml
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_MODELS_DIR: "/var/lib/fnvr/models/faceid"
      FNVR_TZ: "Europe/London"
    volumes:
      - fnvr-data:/var/lib/fnvr

  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      FNVR_API_UPSTREAM: "http://api:8081"
    ports:
      - "8080:80"

  # Pipeline — runs on the Jetson host. Uses the nvidia-container runtime so
  # DeepStream/NVDEC/NVENC/DLA access is wired automatically; we do not bind
  # individual /dev/nvhost-* nodes (those vary per JetPack release).
  pipeline:
    profiles: ["!lite"]
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.pipeline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    runtime: nvidia
    # nvidia-container-toolkit exposes the GPU + /dev/nvhost-* nodes when
    # NVIDIA_VISIBLE_DEVICES=all and NVIDIA_DRIVER_CAPABILITIES covers
    # compute+video. On JetPack 6 the V4L2 M2M codec devices (NVDEC/NVENC)
    # are NOT covered by that mechanism and must be bound explicitly.
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      FNVR_DATABASE_URL: "postgres://fnvr:fnvr@postgres:5432/fnvr?sslmode=disable"
      FNVR_NATS_URL: "nats://nats:4222"
      FNVR_RECORDINGS_DIR: "/var/lib/fnvr/recordings"
      FNVR_USE_DEEPSTREAM: "${FNVR_USE_DEEPSTREAM:-1}"
      FNVR_RECONCILE_SEC: "${FNVR_RECONCILE_SEC:-5}"
      # splitmuxsink has a g_assert in check_completed_gop that aborts the
      # entire process if the first buffer arrives without a GOP context.
      # Unset G_DEBUG so fatal-warnings are off — without this, one bad
      # camera can crash-kill all the others sharing the supervisor process.
      G_DEBUG: ""
    # No /dev/video* mapping here: nvv4l2{dec,enc}oder talks to the Tegra
    # nodes /dev/v4l2-nvdec + /dev/v4l2-nvenc, which are reachable via the
    # /usr/share/{egl,glvnd}/* host mounts below. We used to list
    # /dev/video0 and /dev/video1 but those are USB-webcam nodes, not NVENC
    # / NVDEC — and if a USB cam was later unplugged, docker refused to
    # (re)create the container at all ("no such file or directory") which
    # killed every camera in one go. Do not re-add them.
    # Docker masks /sys/firmware by default. The Tegra libv4l2 plugin reads
    # /sys/firmware/devicetree/base/{compatible,chosen/ids} to identify the
    # chip and take its fast-path (which skips the generic v4l2 capability
    # query that fails on the /dev/v4l2-nvenc stub). Unmask it.
    security_opt:
      - "systempaths=unconfined"
    volumes:
      - fnvr-data:/var/lib/fnvr
      - fnvr-live:/var/lib/fnvr/live
      - ../config:/etc/fnvr:ro
      # Tegra libv4l2 plugin queries libudev for device properties on the
      # /dev/v4l2-nv* nodes. Without /run/udev the lookup fails and the
      # plugin falls back to a generic v4l2 path that issues VIDIOC_QUERYCAP
      # on the stub node, which returns EINVAL.
      - /run/udev:/run/udev:ro
      # nvidia-l4t-gbm package (host-only) ships
      # /usr/share/egl/egl_external_platform.d/nvidia_gbm.json. Without it
      # libEGL fails to find the Tegra GBM vendor and falls back to Mesa,
      # which in turn makes nvv4l2{enc,dec} take the dGPU /dev/nvidia0 path
      # (EINVAL on VIDIOC_QUERYCAP).
      - /usr/share/egl/egl_external_platform.d:/usr/share/egl/egl_external_platform.d:ro
      # nvidia_icd.json and related glvnd vendor files live here on Jetson.
      - /usr/share/glvnd/egl_vendor.d:/usr/share/glvnd/egl_vendor.d:ro

  # Synthetic RTSP source for dev & CI. Publishes a looped test pattern at
  # rtsp://mediamtx:8554/test — add as a camera URL to exercise ingest/record
  # without real hardware. Optional: copy your own clip to ./testclip.mp4 and
  # it'll be served too.
  # MediaMTX serves RTSP re-streams: synthetic test source (profile dev/lite)
  # and — when v4l2 cams are present — a USB→RTSP bridge so pipeline-supervisor
  # can treat local cameras with the proven RTSP code path.
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_RTSPTRANSPORTS: "tcp"
      MTX_PATHS_TEST_SOURCE: "publisher"
      MTX_PATHS_TEST_SOURCEONDEMAND: "no"
      MTX_PATHS_USB0_SOURCE: "publisher"
      MTX_PATHS_USB0_SOURCEONDEMAND: "no"
      # Runtime config API. api-server adds/removes proxy_<camera_id>
      # paths via this for cameras with mtx_proxy=true. Bound to the
      # internal docker network only (no host port mapping below).
      MTX_API: "yes"
      MTX_APIADDRESS: ":9997"
      # Add a second user entry that allows the config API from
      # private docker/LAN ranges. MTX 1.17+ gates the API behind auth
      # and the default user (_0_) only permits publish/read/playback;
      # we keep those defaults intact and add this one for api-server.
      # No host port binding on 9997, so this remains internal-only.
      MTX_AUTHINTERNALUSERS_1_USER: "any"
      MTX_AUTHINTERNALUSERS_1_IPS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.1"
      MTX_AUTHINTERNALUSERS_1_PERMISSIONS_0_ACTION: "api"
      # MediaMTX accepts publishes on any path by default (the auto
      # `all_others` catch-all has source=publisher out of the box).
      # No per-path env vars needed beyond the explicit `test` and
      # `usb0` entries above.
      #
      # Tell MediaMTX's WebRTC server to advertise this LAN IP as a
      # host candidate alongside its own container-bridge IP. Browsers
      # on the same LAN reach this; without it ICE only sees 172.18.x.x
      # which is unreachable from the user's Mac at 172.16.x.x.
      MTX_WEBRTCADDITIONALHOSTS: "172.16.4.23"
      # Single-port UDP for ICE so we can publish exactly one UDP port
      # through docker. Without this MediaMTX uses ephemeral UDP ports
      # and we'd need to expose a wide range or use host networking.
      # 8189 chosen to avoid collisions.
      MTX_WEBRTCLOCALUDPADDRESS: ":8189"
      # Recording. MediaMTX writes one fragmented MP4 per
      # recordSegmentDuration window per path. fMP4 (moof+mdat) seeks
      # mid-write — unlike progressive MP4 from qtmux, which requires
      # a final moov for the full duration to be addressable. The
      # timeline player can therefore play current-hour clips without
      # the "stuck on first frame" bug.
      #
      # Path layout: /var/lib/fnvr/recordings/<camera>/<YYYY-MM-DD>/<HH-MM-SS>-<frac>.mp4
      # — kept simple. storage-manager walks this and rolls fragments
      # into per-hour segment rows in postgres.
      MTX_RECORD: "yes"
      MTX_RECORDPATH: "/var/lib/fnvr/recordings/%path/%Y-%m-%d_%H-%M-%S-%f"
      MTX_RECORDFORMAT: "fmp4"
      MTX_RECORDSEGMENTDURATION: "1h"
      MTX_RECORDPARTDURATION: "1s"
      MTX_RECORDDELETEAFTER: "14d"
      # Playback HTTP server — serves stitched fMP4/MP4 clips for any
      # path + start + duration window. Used by the timeline view to
      # play back recordings (replaces the per-segment-MP4 endpoint
      # in api-server which couldn't handle progressive MP4 mid-write).
      MTX_PLAYBACK: "yes"
      MTX_PLAYBACKADDRESS: ":9996"
    volumes:
      # MediaMTX writes recordings here; storage-manager + api-server
      # read from the same path via the same volume.
      - fnvr-data:/var/lib/fnvr
    ports:
      - "8554:8554" # rtsp
      - "8889:8889" # webrtc (whep on /<path>/whep)
      # WebRTC media uses ICE/UDP. Mediamtx default ICE port range is
      # the OS-ephemeral; pin a known range here so it can be exposed
      # cleanly. Browsers connect from the LAN, so this bridge needs to
      # forward ICE UDP from the host to the container. Range chosen
      # to fit a few hundred concurrent sessions without colliding.
      - "8189:8189/udp" # webrtc ICE (single-port UDP mux)
      - "9996:9996" # playback API (timeline /get clips)

  # USB→RTSP bridge. When /dev/video0 exists on the host, reads MJPEG and
  # publishes H.264 to rtsp://mediamtx:8554/fnvr-usb0. Camera entries in the
  # DB use that URL; pipeline-supervisor then hits it via the working RTSP
  # code path — sidestepping the direct v4l2 SIGSEGV-after-NVENC-init bug.
  usb-bridge:
    # Only started when explicitly requested (`--profile usb`): without
    # the profile gate, a missing /dev/video0 (no USB cam plugged in)
    # makes docker refuse to (re)create the container, which bleeds into
    # manual restart-all operations. Most deployments use IP cameras and
    # don't need this path.
    profiles: ["usb"]
    image: linuxserver/ffmpeg:latest
    restart: unless-stopped
    depends_on:
      - mediamtx
    devices:
      - /dev/video0
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        exec ffmpeg -f v4l2 -input_format mjpeg -video_size 1280x720 \
          -framerate 30 -i /dev/video0 \
          -c:v libx264 -preset veryfast -tune zerolatency \
          -g 60 -b:v 4M -pix_fmt yuv420p \
          -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/usb0

  # Companion that pushes a synthetic looped stream into mediamtx.
  testsrc:
    profiles: ["dev", "lite"]
    image: linuxserver/ffmpeg:latest
    restart: unless-stopped
    depends_on:
      - mediamtx
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        exec ffmpeg -re -stream_loop -1 \
          -f lavfi -i "testsrc2=size=1920x1080:rate=30,drawtext=text='fnvr %{localtime}':fontsize=48:fontcolor=white:x=20:y=20" \
          -f lavfi -i "sine=frequency=440" \
          -c:v libx264 -preset veryfast -tune zerolatency -g 60 -b:v 4M \
          -c:a aac -b:a 64k \
          -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/test

volumes:
  postgres-data:
  fnvr-data:
  mosquitto-data:
  # tmpfs-backed named volume for the live JPEG ring. Shared across
  # pipeline (writer) + api + storage (readers). 128 MB is plenty:
  # multifilesink keeps max-files=4 per camera at ~50 KB each.
  fnvr-live:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=128m,mode=0755"
