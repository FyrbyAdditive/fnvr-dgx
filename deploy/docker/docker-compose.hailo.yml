# Overlay that enables the Hailo-8 PCIe accelerator. Layered on top of the
# base compose; requires the host install to have run:
#   sudo ./deploy/hailo/install-hailo-host.sh
# (which installs the driver + firmware blob; the broker brings its own
# libhailort).
#
# Architecture — why a broker:
#   libhailort v4.23.0's multi_process_service path (the stock answer to
#   sharing one Hailo across processes) is broken for our yolov11l
#   NMS-on-chip workload — it returns HAILO_INTERNAL_FAILURE on the first
#   run_async because ConfiguredInferModelImpl wraps an RPC-backed network
#   group unstably. Rather than fork libhailort, we run a single
#   fnvr-hailo-broker container that owns the VDevice exclusively
#   (direct /dev/hailo0 path, known-working), and pipeline-supervisor
#   workers talk to it over a unix socket at /var/run/fnvr/hailo.sock.
#   See apps/hailo-broker/ for the protocol (wire.h).
#
# Usage:
#   sudo docker compose \
#     -f deploy/docker/docker-compose.yml \
#     -f deploy/docker/docker-compose.hailo.yml \
#     up -d --force-recreate
services:
  hailo-broker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.hailo-broker
    image: fnvr-hailo-broker:latest
    container_name: fnvr-hailo-broker-1
    restart: unless-stopped
    devices:
      - /dev/hailo0
    volumes:
      # Shared runtime dir that holds the unix socket. Pipeline container
      # bind-mounts the same path.
      - fnvr-hailo-sock:/var/run/fnvr
      # HEF file lives in the fnvr-data volume (staged by the install
      # script). The broker image's ENTRYPOINT points at this path.
      - fnvr-data:/var/lib/fnvr:ro

  pipeline:
    depends_on:
      hailo-broker:
        condition: service_started
    volumes:
      # Socket-only mount: pipeline does NOT touch /dev/hailo0 directly.
      # The broker owns that device; the pipeline supervisor's workers
      # connect to /var/run/fnvr/hailo.sock and send RGB frames.
      - fnvr-hailo-sock:/var/run/fnvr

  # api-server still needs /dev/hailo0 visible so the UI's
  # GET /api/v1/system/hailo can stat the device and enable the "Hailo-8"
  # option in the per-camera Backend dropdown. api doesn't open the device,
  # just stats it.
  api:
    devices:
      - /dev/hailo0

volumes:
  fnvr-hailo-sock:
