# Lazy-resolve upstreams so nginx doesn't exit if `api` is slow to come up.
# Docker's embedded DNS lives at 127.0.0.11.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy — upstream in a variable forces runtime resolution.
  location /api/ {
    set $api_upstream "http://api:8081";
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Needed for SSE: don't buffer, long-lived.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # MediaMTX WHEP proxy — Live tiles POST SDP offers here. Only the
  # offer/answer HTTP exchange goes through this proxy; ICE/UDP media
  # flows direct from the browser to the host's :8189/udp port (the
  # MTX_WEBRTCLOCALUDPADDRESS published in docker-compose), with the
  # host's LAN IP advertised via MTX_WEBRTCADDITIONALHOSTS so the
  # browser knows where to send it.
  #
  # rewrite strips the /mtx prefix before proxy_pass — necessary
  # because proxy_pass with a variable upstream skips nginx's
  # automatic prefix-rewrite, so without an explicit rewrite the
  # /mtx/... URI is forwarded verbatim and MediaMTX 404s.
  # We need lazy DNS resolution so nginx doesn't crash if mediamtx is
  # slow; the resolver at the top of this file enables that. But
  # combining a variable upstream with prefix-stripping is fiddly:
  # `proxy_pass $upstream/` with a $variable upstream skips nginx's
  # automatic prefix rewrite and instead concatenates the full URI,
  # so /mtx/foo gets forwarded as /mtx/foo upstream. The fix: keep the
  # variable for lazy DNS, do the rewrite in nginx with `rewrite ...
  # break`, and use the variable WITHOUT a trailing slash so nginx
  # forwards the rewritten URI verbatim.
  location /mtx/ {
    set $mtx_upstream "http://mediamtx:8889";
    rewrite ^/mtx(/.*)$ $1 break;
    proxy_pass $mtx_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_buffering off;
    # Rewrite the Location header MediaMTX sends back on POST /whep
    # responses so subsequent PATCH/DELETE for trickle ICE + teardown
    # land back through this proxy. Without this the browser PATCHes
    # /live_<id>/whep/<sid> directly which the SPA fallback turns into
    # a 405 (or 200-with-index.html), the reader never confirms ICE
    # candidates, and media never flows.
    proxy_pass_header Location;
    # Rewrite the Location header MediaMTX returns on POST /whep so
    # subsequent PATCH (trickle ICE) and DELETE (teardown) land back
    # through this proxy. We keep the result as a host-relative path
    # so the browser uses the original origin (preserving the port).
    # Without this nginx rewrites the host into the Location which
    # collapses :8080 into the default :80 and the browser PATCHes
    # to a port that nothing's listening on.
    proxy_redirect ~^http://[^/]+/(live_.*) /mtx/$1;
    proxy_redirect ~^/(live_.*) /mtx/$1;
  }
}
