# Lazy-resolve upstreams so nginx doesn't exit if `api` is slow to come up.
# Docker's embedded DNS lives at 127.0.0.11.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy — upstream in a variable forces runtime resolution.
  location /api/ {
    set $api_upstream "http://api:8081";
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Needed for SSE: don't buffer, long-lived.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
