# Lazy-resolve upstreams so nginx doesn't exit if `api` is slow to come up.
# Docker's embedded DNS lives at 127.0.0.11.
resolver 127.0.0.11 ipv6=off valid=30s;

# Lossless response compression. Static assets and API JSON both
# shrink ~70-90% (the faces endpoints ship numeric embedding vectors
# that compress especially well). gzip_proxied any is required for the
# /api/ proxy; the SSE stream opts out below — compressing an event
# stream would buffer frames.
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types application/javascript text/css application/json image/svg+xml;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback. no-cache (= revalidate, not "don't store") on the
  # entry point so a deploy's new asset hashes are seen immediately;
  # the hashed assets themselves are immutable below.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Vite content-hashed bundles — a changed file always gets a new
  # URL, so tell browsers to never revalidate. Deliberately scoped to
  # /assets/ only: files copied from public/ (mtx-reader.js) keep
  # their names across deploys and must stay revalidatable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SSE must flow uncompressed or gzip's window buffering holds
  # events back. Everything else about the proxy matches /api/ below.
  location = /api/v1/events/stream {
    gzip off;
    set $api_upstream "http://api:8081";
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # API proxy — upstream in a variable forces runtime resolution.
  location /api/ {
    set $api_upstream "http://api:8081";
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Needed for SSE: don't buffer, long-lived.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # MediaMTX is reached directly at :8889/whep + :9996/get from the
  # browser (see Live.tsx, Timeline.tsx) so the proxy block we used
  # to host here is gone. Direct access works on the LAN because
  # MediaMTX has CORS open to private ranges and webrtcAdditional-
  # Hosts advertises the host's LAN IP for ICE.
}
