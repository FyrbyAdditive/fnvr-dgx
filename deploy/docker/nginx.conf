# Lazy-resolve upstreams so nginx doesn't exit if a peer is slow to come up.
# Docker's embedded DNS lives at 127.0.0.11.
resolver 127.0.0.11 ipv6=off valid=30s;

# Lossless response compression (see perf pass). SSE opts out below.
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types application/javascript text/css application/json image/svg+xml;

# Security headers, applied per-response. nginx drops inherited add_header
# in any location that declares its own, so this set is repeated in the
# two static locations that set Cache-Control. Proxy locations below set
# no add_header and therefore inherit these.
#   frame-ancestors 'none' (CSP) replaces X-Frame-Options.
#   connect-src / media-src stay 'self' because every browser interaction
#   (API, SSE, WHEP signaling, playback, transcode) is now same-origin
#   through this proxy; WebRTC media itself is UDP/DTLS, not fetch()'d.
map $sent_http_content_type $fnvr_csp {
  default "default-src 'self'; connect-src 'self'; media-src 'self' blob:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'";
}

# Plain HTTP → permanent redirect to HTTPS. No app is served over 80.
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  ssl_certificate     /etc/nginx/certs/fnvr.crt;
  ssl_certificate_key /etc/nginx/certs/fnvr.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:4m;
  ssl_session_timeout 1h;

  # Reject oversized request bodies at the edge (embeddings/uploads are
  # bounded well under this; api-server enforces per-endpoint caps too).
  client_max_body_size 20m;

  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Content-Security-Policy $fnvr_csp always;

  # SPA fallback. no-cache = revalidate (not "don't store") so a deploy's
  # new asset hashes are picked up immediately.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy $fnvr_csp always;
  }

  # Vite content-hashed bundles are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy $fnvr_csp always;
  }

  # SSE — uncompressed, long-lived, unbuffered.
  location = /api/v1/events/stream {
    gzip off;
    set $api_upstream "http://api:8081";
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # API proxy.
  location /api/ {
    set $api_upstream "http://api:8081";
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # WHEP signaling — proxied with the MediaMTX path preserved 1:1 (no
  # trailing slash on proxy_pass) so the WHEP session Location resolves
  # back through this same prefix. Only the recorded/proxy stream name
  # shapes are matched. WebRTC *media* is separate (UDP 8189, DTLS).
  location ~ ^/(live_|lp_|proxy_)[A-Za-z0-9_-]+/whep {
    set $mtx_whep "http://mediamtx:8889";
    proxy_pass $mtx_whep;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 60s;
  }

  # Timeline playback — MediaMTX /get stitched fMP4 windows.
  location /playback/ {
    set $mtx_playback "http://mediamtx:9996/";
    proxy_pass $mtx_playback;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  # H.264 transcode fallback for browsers that can't play hvc1.
  location /transcode/ {
    set $transcoder "http://transcoder:9995/";
    proxy_pass $transcoder;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 300s;
  }
}
