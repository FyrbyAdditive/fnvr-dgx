# NATS server config. Token auth so the bus is not open to anything that
# can reach :4222. $NATS_TOKEN is supplied from the container environment
# (secrets.env, gitignored) — NATS expands $VAR references at load.
#
# The bus carries detections and face embeddings (biometric data) and
# control subjects (model reload, pipeline restart); it must not be
# anonymous. The port is docker-internal only (compose `expose`), so this
# token is defense-in-depth against a compromised peer / misconfig, not
# the sole control.

jetstream {}

# Monitoring endpoint — internal only (not host-published).
http_port: 8222

authorization {
  token: $NATS_TOKEN
}
