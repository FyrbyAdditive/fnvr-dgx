name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          [
            apps/api-server,
            apps/event-processor,
            apps/storage-manager,
            apps/notification-dispatcher,
          ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: Typecheck + Build
        working-directory: apps/web
        run: npm run build

  # Compile-checks the DeepStream pipeline container through the C++
  # build stage on arm64. No GPU on runners — engines and e2e stay on
  # the DGX Spark (DeepStream on Spark is container-only).
  pipeline-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build pipeline image
        run: docker build -f deploy/docker/Dockerfile.pipeline .
